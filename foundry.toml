[profile.default]
src = "contracts"
out = "out"
cache_path = "forge-cache"
libs = ["lib", "node_modules"]
test = "test"
script = "script"
solc_version = "0.8.22"
evm_version = "paris"
optimizer = true
optimizer_runs = 200
via_ir = false
gas_reports = ["LegacyTokenOFTAdapter", "LegacyTokenOFT", "LegacyToken"]
ffi = false

[profile.default.fuzz]
runs = 1000
max_test_rejects = 65536
seed = "0x1"

[profile.default.invariant]
runs = 256
depth = 30
call_override = false

[rpc_endpoints]
sepolia = "${SEPOLIA_RPC_URL}"
base_sepolia = "${BASE_SEPOLIA_RPC_URL}"
arbitrum_sepolia = "${ARBITRUM_SEPOLIA_RPC_URL}"

[etherscan]
sepolia = { key = "${ETHERSCAN_API_KEY}", url = "https://api.etherscan.io/v2/api?chainid=11155111" }
base_sepolia = { key = "${BASESCAN_API_KEY}", url = "https://api.etherscan.io/v2/api?chainid=84532" }
arbitrum_sepolia = { key = "${ARBISCAN_API_KEY}", url = "https://api.etherscan.io/v2/api?chainid=421614" }
